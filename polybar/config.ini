orange = #ffb86c
pink = #ff79c6
purple = #bd93f9
red = #ff5555
yellow = #f1fa8c

black = #000
white = #FFF

trans = #00000000
semi-trans-black = #aa000000

#Rose-Pine
#[colors]
;; Base
#background = #191724
;; Highlight Med
