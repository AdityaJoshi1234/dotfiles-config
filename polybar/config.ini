;foreground = ${xrdb:color7:#222}
;foreground = #93a1a1
;foreground-alt = #eee8d5
;primary = #ffb52a
;secondary = #e60053
;alert = #bd2c40
;red = dc322f


[bar/bar1]
width = 100%
height = 20pt
radius = 0 
tray-position = right
; dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
#offset-x = 5%
#offset-y = 10%
line-size = 1pt
#fixed-center = true
border-size = 0pt
bottom = false

#override-redirect = true

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}
#font-1 = "FontAwesome:size=15:style=Light;4.5"
font-0 = "JetBrains MonoNL NerdFont:size=12.5:style=Light;3.5"
;font-1 = "Nerd Fonts Symbols"
;font-0 = Hack Nerd Font Mono:size=15:style=monospace;4.8
;font-0 = Fira Code Nerd Font Bold:size=14:style=bold:1
font-2 = "Symbols NerdFont Mono"
font-3 = "DejaVu Serif"

modules-left = i3 
; xwindow xworkspaces
modules-center = date 
modules-right = pulseaudio battery memory

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
ws-icon-1 = 1;ÔČę

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1



ws-name-1 = I


#ws-icon-0 = 3;
#ws-icon-0 = 4;
#ws-icon-0 = 5;
#ws-icon-0 = 6;
#ws-icon-0 = 7;
#ws-icon-0 = 8;
#ws-icon-0 = 9;
#ws-icon-0 = 10;
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
enable-scroll = true

; Only show workspaces on the same output as the bar
;pin-workspaces = true

label-mode = "Óěô %mode%"
label-mode-padding = 2
label-mode-foreground = ${color.black}
label-mode-background = ${color.lightred}
label-mode-font = 2

; focused = Active workspace on focused monitor
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${color.green}
label-focused-underline= ${color.background}
label-focused-padding = 1.5

label-focused-font = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %name%
label-unfocused-padding = 1.5
label-unfocused-font = 2
label-unfocused-background = ${color.background}
label-unfocused-foreground = ${color.white}

; visible = Active workspace on unfocused monitor
label-visible = %name%
label-visible-background = ${color.background}
label-visible-foreground = ${color.grey}
label-visible-underline = ${color.background}
label-visible-padding = 1.5
label-visible-font = 2

; urgent = Workspace with urgency hint set
label-urgent = %name%
label-urgent-background = ${color.background}
label-urgent-foreground = ${color.lightred}
label-urgent-padding = 1.5
label-urgent-font = 2

; Separator in between workspaces
;label-separator = Óāį
;label-separator-foreground = ${color.white}
;label-separator-padding = 0
ws-name-0 = I
ws-icon-1 = "Ôćĺ "
ws-icon-2 = "ÔĄ† "
ws-icon-3 = "Óěô "
ws-icon-4 = "ÔĄĶ "
ws-icon-5 = "ÔÉ† "
#ws-icon-default = "ÔĆÉ "
[module/xwindow]
type = internal/xwindow
label = %title%
label-maxlen = 50

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${col    ors.primary}
format-volume = <label-volume>

label-volume = %percentage%%
label-muted = 
label-muted-foreground = ${colors.disab    led}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%



;[module/cpu]
;type = internal/cpu
;interval = 2
;format-prefix = "CPU "
;format-prefix-foreground = ${colors.primary}
;label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

;[module/wlan]
;inherit = network-base
;interface-type = wireless
;label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%


[module/date]
type = internal/date
interval = 1

#date = %H:%M:%S
date = %d-%m-%Y %H:%M:%S 
#; %H:%M:%S
#; use date-alt for the alternative shit
label = %date%
label-foreground = ${colors.primary}
#[module/date]
#type = internal/date
#interval = 1

#date = %a %d-%b %Y  %I:%M %p
#date-alt = %I:%M %p

#format-foreground = ${colors.primary}
#format-prefix = "ÔĀ≥  "
#label = %date%
#label-foreground = ${colors.foreground}
#[settings]
#screenchange-reload = true
#pseudo-transparency = true

; vim:ft=dosini
[module/cmus]
[module/cmus]
type = custom/script

exec = bash ~/.config/polybar/cmus.sh
exec-if = pgrep -x cmus
interval = 1

click-left = cmus-remote --pause
click-right = cmus-remote --stop

format = <label>
format-underline = ${colors.primary}
label = %output%
 [module/mpv]
 type =custom/script

 exec = bash ~/.config/polybar/mpv.sh
interval = 1

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99
format-charging = Charging <label-charging>
format-discharging = Discharging <label-discharging>
; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 5
interval = 0
; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5
